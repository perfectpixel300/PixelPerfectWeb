<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Shop Status | Pixel Perfect</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f4f1ec;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem;
    color: #1c1712;
  }

  .panel {
    background: #fffdf9;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.09);
  }

  /* ── Header ── */
  .panel-header {
    background: #1c1712;
    padding: 1.6rem 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .panel-header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: #f5e9cc;
    letter-spacing: 0.02em;
  }
  .panel-header .sub {
    font-size: 0.78rem;
    color: #9e8e74;
    margin-top: 1px;
  }

  /* ── Body ── */
  .panel-body { padding: 2rem; }

  /* ── Status Card ── */
  .status-card {
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: background 0.3s, border-color 0.3s;
  }
  .status-card.open   { background: #eaf7f0; border: 1.5px solid #8dd9b3; }
  .status-card.closed { background: #fff3f0; border: 1.5px solid #f5b5a0; }

  .status-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .status-card.open   .status-icon { background: #c5efd9; }
  .status-card.closed .status-icon { background: #fdddd5; }

  .status-text .label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9e8e74;
  }
  .status-text .value {
    font-size: 1.35rem;
    font-weight: 600;
    margin-top: 2px;
  }
  .status-card.open   .status-text .value { color: #1a7a42; }
  .status-card.closed .status-text .value { color: #b83b1a; }

  /* ── Section label ── */
  .section-label {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9e8e74;
    margin-bottom: 0.7rem;
  }

  /* ── Toggle buttons ── */
  .toggle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .toggle-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    font-weight: 500;
    border-radius: 10px;
    padding: 0.8rem;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .toggle-btn.open-btn {
    background: #e6f7ed; color: #1a7a42; border-color: #8dd9b3;
  }
  .toggle-btn.open-btn:hover, .toggle-btn.open-btn.active {
    background: #2d9e5e; color: #fff; border-color: #2d9e5e;
  }
  .toggle-btn.closed-btn {
    background: #fff0ed; color: #b83b1a; border-color: #f5b5a0;
  }
  .toggle-btn.closed-btn:hover, .toggle-btn.closed-btn.active {
    background: #e06040; color: #fff; border-color: #e06040;
  }

  /* ── Auto mode ── */
  .auto-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #f7f4ef;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    margin-bottom: 1.5rem;
  }
  .auto-row .auto-text { font-size: 0.9rem; color: #4a4035; }
  .auto-row .auto-sub  { font-size: 0.78rem; color: #9e8e74; margin-top: 2px; }

  /* Toggle switch */
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: #d0c9bf; border-radius: 34px; transition: 0.3s;
  }
  .slider:before {
    content: ""; position: absolute;
    height: 18px; width: 18px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .slider { background: #2d9e5e; }
  input:checked + .slider:before { transform: translateX(20px); }

  /* ── Custom message ── */
  .msg-section { margin-bottom: 1.5rem; }
  .msg-section textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: #1c1712;
    background: #f7f4ef;
    border: 1px solid #ddd8cf;
    border-radius: 10px;
    padding: 0.8rem;
    width: 100%;
    min-height: 90px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.55;
  }
  .msg-section textarea:focus { border-color: #b0956e; }

  /* ── Save button ── */
  .save-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    background: #1c1712;
    color: #f5e9cc;
    border: none;
    border-radius: 10px;
    padding: 0.85rem;
    width: 100%;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: #3a2e24; }

  /* ── Toast ── */
  .toast {
    display: none;
    margin-top: 1rem;
    background: #eaf7f0;
    border: 1px solid #8dd9b3;
    color: #1a7a42;
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.88rem;
    text-align: center;
  }
  .toast.show { display: block; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid #ede8df; margin: 1.5rem 0; }

  /* ── Last saved ── */
  .last-saved {
    font-size: 0.78rem; color: #9e8e74; text-align: center; margin-top: 0.8rem;
  }
</style>
</head>
<body>

<div class="panel">
  <!-- Header -->
  <div class="panel-header">
    <div>
      <div class="logo">Pixel Perfect</div>
      <div class="sub">Shop Status Admin Panel</div>
    </div>
  </div>

  <div class="panel-body">
    <!-- Current Status Display -->
    <div class="section-label">Current Status</div>
    <div class="status-card" id="status-card">
      <div class="status-icon" id="status-icon"></div>
      <div class="status-text">
        <div class="label">Shop is</div>
        <div class="value" id="status-value"></div>
      </div>
    </div>

    <!-- Open / Closed buttons -->
    <div class="section-label">Set Status Manually</div>
    <div class="toggle-row">
      <button class="toggle-btn open-btn" id="btn-open" onclick="setStatus('open')">
        🟢 Mark as Open
      </button>
      <button class="toggle-btn closed-btn" id="btn-closed" onclick="setStatus('closed')">
        🔴 Mark as Closed
      </button>
    </div>

    <!-- Auto mode -->
    <div class="auto-row">
      <div>
        <div class="auto-text">Auto mode (use business hours)</div>
        <div class="auto-sub">Popup calculates status from your opening hours</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="auto-toggle" onchange="toggleAuto(this)" />
        <span class="slider"></span>
      </label>
    </div>

    <hr class="divider" />

    <!-- Custom Messages -->
    <div class="msg-section">
      <div class="section-label" style="margin-bottom:0.5rem;">Open message</div>
      <textarea id="msg-open" placeholder="We're open! Come visit us..."></textarea>
    </div>

    <div class="msg-section">
      <div class="section-label" style="margin-bottom:0.5rem;">Closed message</div>
      <textarea id="msg-closed" placeholder="We're closed right now, but..."></textarea>
    </div>

    <!-- Save -->
    <button class="save-btn" onclick="saveSettings()">Save Changes</button>
    <div class="toast" id="toast">✓ Settings saved — popup will update on next page load.</div>
    <div class="last-saved" id="last-saved"></div>
  </div>
</div>

<script>
  const STORAGE_KEY  = "pp_shop_status";
  const MSG_KEY      = "pp_shop_messages";
  const SAVED_KEY    = "pp_admin_saved_at";

  /* ── Load saved settings ── */
  function loadSettings() {
    let status = { isOpen: true, manual: false };
    try { status = JSON.parse(localStorage.getItem(STORAGE_KEY)) || status; } catch(e){}

    let msgs = { open: "", closed: "" };
    try { msgs = JSON.parse(localStorage.getItem(MSG_KEY)) || msgs; } catch(e){}

    document.getElementById("auto-toggle").checked = !status.manual;
    document.getElementById("msg-open").value    = msgs.open;
    document.getElementById("msg-closed").value  = msgs.closed;

    renderStatus(status.isOpen);

    const savedAt = localStorage.getItem(SAVED_KEY);
    if (savedAt) {
      document.getElementById("last-saved").textContent =
        "Last saved: " + new Date(parseInt(savedAt)).toLocaleString();
    }
  }

  /* ── Render current status display ── */
  function renderStatus(isOpen) {
    const card  = document.getElementById("status-card");
    const icon  = document.getElementById("status-icon");
    const value = document.getElementById("status-value");
    const btnO  = document.getElementById("btn-open");
    const btnC  = document.getElementById("btn-closed");

    card.className  = "status-card " + (isOpen ? "open" : "closed");
    icon.textContent = isOpen ? "🛍️" : "🔒";
    value.textContent = isOpen ? "Open" : "Closed";
    btnO.classList.toggle("active", isOpen);
    btnC.classList.toggle("active", !isOpen);
  }

  /* ── Set status manually ── */
  function setStatus(state) {
    const isOpen = state === "open";
    const auto   = document.getElementById("auto-toggle").checked;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ isOpen, manual: !auto }));
    renderStatus(isOpen);
    if (auto) { document.getElementById("auto-toggle").checked = false; }
  }

  /* ── Toggle auto mode ── */
  function toggleAuto(checkbox) {
    if (checkbox.checked) {
      // recalculate from hours
      const status = autoStatus();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ isOpen: status, manual: false }));
      renderStatus(status);
    } else {
      const current = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"isOpen":true}');
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ isOpen: current.isOpen, manual: true }));
    }
  }

  /* ── Auto-calculate open/closed from hours ── */
  function autoStatus() {
    const HOURS = [
      { open: "10:00 AM", close: "6:00 PM" },
      { open: "10:00 AM", close: "7:00 PM" },
      { open: "10:00 AM", close: "7:00 PM" },
      { open: "10:00 AM", close: "7:00 PM" },
      { open: "10:00 AM", close: "7:00 PM" },
      { open: "10:00 AM", close: "8:00 PM" },
      { open: "10:00 AM", close: "8:00 PM" },
    ];
    const now = new Date();
    const day = HOURS[now.getDay()];
    const toMin = t => {
      const [h, m] = t.replace(/ (AM|PM)/, "").split(":").map(Number);
      const pm = t.includes("PM") && h !== 12;
      return (pm ? h + 12 : (h === 12 && t.includes("AM") ? 0 : h)) * 60 + m;
    };
    const cur = now.getHours() * 60 + now.getMinutes();
    return cur >= toMin(day.open) && cur < toMin(day.close);
  }

  /* ── Save messages ── */
  function saveSettings() {
    const msgs = {
      open:   document.getElementById("msg-open").value.trim(),
      closed: document.getElementById("msg-closed").value.trim(),
    };
    localStorage.setItem(MSG_KEY, JSON.stringify(msgs));
    localStorage.setItem(SAVED_KEY, Date.now().toString());

    const toast = document.getElementById("toast");
    toast.classList.add("show");
    document.getElementById("last-saved").textContent =
      "Last saved: " + new Date().toLocaleString();
    setTimeout(() => toast.classList.remove("show"), 3500);
  }

  loadSettings();
</script>
</body>
</html>
