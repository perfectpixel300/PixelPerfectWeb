<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop Status Popup — Pixel Perfect</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ─── POPUP OVERLAY ─── */
  #pp-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 15, 10, 0.55);
    backdrop-filter: blur(3px);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }
  #pp-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── POPUP CARD ─── */
  #pp-card {
    background: #fffdf9;
    border-radius: 18px;
    padding: 2.5rem 2.2rem 2rem;
    max-width: 380px;
    width: 90%;
    text-align: center;
    position: relative;
    transform: translateY(24px) scale(0.97);
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2);
    box-shadow: 0 24px 60px rgba(0,0,0,0.18);
  }
  #pp-overlay.visible #pp-card {
    transform: translateY(0) scale(1);
  }

  /* ─── LOGO ─── */
  .pp-icon {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    overflow: hidden;
    background: transparent;
  }
  .pp-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .pp-icon.open  { background: transparent; }
  .pp-icon.closed { background: transparent; }

  /* ─── STATUS BADGE ─── */
  .pp-badge {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 22px;
    border-radius: 999px;
    margin-bottom: 1rem;
  }
  .pp-badge.open   { background: #d1f5e0; color: #1a7a42; }
  .pp-badge.closed { background: #fdddd5; color: #b83b1a; }

  /* ─── HEADING ─── */
  #pp-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: #1c1712;
    margin: 0 0 0.5rem;
  }

  /* ─── MESSAGE ─── */
  #pp-card p {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: #6b6355;
    line-height: 1.65;
    margin: 0 0 1.6rem;
  }


  /* ─── DISMISS BUTTON ─── */
  #pp-dismiss {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    padding: 0.7rem 2rem;
    cursor: pointer;
    width: 100%;
    transition: filter 0.2s;
  }
  #pp-dismiss.open   { background: #2d9e5e; color: #fff; }
  #pp-dismiss.closed { background: #e06040; color: #fff; }
  #pp-dismiss:hover  { filter: brightness(1.08); }

  /* ─── CLOSE X ─── */
  #pp-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none;
    font-size: 20px; color: #9e9080;
    cursor: pointer; line-height: 1;
    padding: 4px;
  }
  #pp-close:hover { color: #4a4035; }
</style>
</head>
<body>

<!-- ╔══════════════════════════════╗ -->
<!-- ║   SHOP STATUS POPUP HTML    ║ -->
<!-- ╚══════════════════════════════╝ -->

<div id="pp-overlay" role="dialog" aria-modal="true" aria-labelledby="pp-title">
  <div id="pp-card">
    <button id="pp-close" aria-label="Close">&times;</button>

    <div class="pp-icon" id="pp-icon"></div>
    <span class="pp-badge" id="pp-badge"></span>
    <h2 id="pp-title"></h2>
    <p id="pp-message"></p>

    <button id="pp-dismiss" onclick="closePPPopup()"></button>
  </div>
</div>

<script>
(function () {
  /* ── CONFIG: edit here or pull from your CMS ── */
  const HOURS = [
    { day: "Sun", open: "10:00 AM", close: "6:00 PM"  },
    { day: "Mon", open: "10:00 AM", close: "7:00 PM"  },
    { day: "Tue", open: "10:00 AM", close: "7:00 PM"  },
    { day: "Wed", open: "10:00 AM", close: "7:00 PM"  },
    { day: "Thu", open: "10:00 AM", close: "7:00 PM"  },
    { day: "Fri", open: "10:00 AM", close: "8:00 PM"  },
    { day: "Sat", open: "10:00 AM", close: "8:00 PM"  },
  ];
  const MESSAGES = {
    open:   "We're open and ready to help you find something beautiful. Stop by today!",
    closed: "We're closed right now, but we'd love to see you during our opening hours below.",
  };
  const STORAGE_KEY = "pp_shop_status";   // shared with admin panel
  const DISMISS_KEY = "pp_popup_dismissed";
  const DISMISS_HOURS = 4;               // re-show after N hours

  /* ── Read status from localStorage (set by admin panel) ── */
  function getStatus() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    // Default: auto-calculate from hours
    const now   = new Date();
    const day   = HOURS[now.getDay()];
    const toMin = t => { const [h, m] = t.replace(/ (AM|PM)/, "").split(":").map(Number); const pm = t.includes("PM") && h !== 12; return (pm ? h + 12 : h === 12 && t.includes("AM") ? 0 : h) * 60 + m; };
    const cur   = now.getHours() * 60 + now.getMinutes();
    return { isOpen: cur >= toMin(day.open) && cur < toMin(day.close), manual: false };
  }

  /* ── Check dismiss cooldown ── */
  function wasDismissedRecently() {
    const ts = localStorage.getItem(DISMISS_KEY);
    if (!ts) return false;
    return (Date.now() - parseInt(ts)) < DISMISS_HOURS * 3600 * 1000;
  }

  /* ── Populate & show popup ── */
  function initPopup() {
    if (wasDismissedRecently()) return;
    const { isOpen } = getStatus();

    document.getElementById("pp-badge").textContent = isOpen ? "We're Open" : "Currently Closed";
    document.getElementById("pp-title").textContent = isOpen ? "Welcome to Pixel Perfect!" : "See You Soon!";
    document.getElementById("pp-message").textContent = MESSAGES[state];

  window.closePPPopup = function () {
    document.getElementById("pp-overlay").classList.remove("visible");
    localStorage.setItem(DISMISS_KEY, Date.now().toString());
  };

  document.getElementById("pp-close").addEventListener("click", closePPPopup);
  document.getElementById("pp-overlay").addEventListener("click", function (e) {
    if (e.target === this) closePPPopup();
  });

  initPopup();
